<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sparta Gym | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; }
        .font-sparta { font-family: 'Cinzel', serif; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at center, #121212 0%, #000000 100%);
            color: #e4e4e7;
        }
        .glass-card {
            background: rgba(18, 18, 18, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .input-sparta {
            background: rgba(0,0,0,0.4) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            transition: all 0.3s;
        }
        .input-sparta:focus { border-color: var(--gold) !important; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); outline: none; }
        .btn-gold {
            background: linear-gradient(to bottom, #d4af37, #8a6d10);
            color: black;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-gold:hover { transform: scale(1.02); filter: brightness(1.1); }
        .status-enter { animation: reveal 0.4s ease-out; }
        .text-gold { color: var(--gold); }
        .bg-gold { background-color: var(--gold); }
        @keyframes reveal { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <section id="loginSection" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-md p-10 rounded-[2.5rem] relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#d4af37] to-transparent"></div>
            
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-gold rounded-2xl flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(212,175,55,0.3)]">
                    <i class="fas fa-shield-alt text-black text-2xl"></i>
                </div>
                <h2 class="font-sparta text-2xl tracking-widest text-white">ACESSO <span class="text-gold">ADMIN</span></h2>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] ml-1">Usuário</label>
                    <input type="text" id="usuario" required class="input-sparta w-full p-4 rounded-xl mt-1 text-sm" placeholder="Digite seu usuário">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] ml-1">Senha Master</label>
                    <input type="password" id="password" required class="input-sparta w-full p-4 rounded-xl mt-1 text-sm" placeholder="••••••••">
                </div>
                
                <div id="loginError" class="hidden bg-red-500/10 border border-red-500/20 text-red-500 text-xs p-3 rounded-lg text-center font-bold">
                    Usuário ou senha incorretos.
                </div>

                <button type="submit" class="btn-gold w-full py-4 rounded-xl font-sparta tracking-widest mt-4">
                    ENTRAR NO SISTEMA
                </button>
            </form>
        </div>
    </section>

    <section id="adminSection" class="hidden">
        <nav class="border-b border-zinc-800 bg-black/60 backdrop-blur-md mb-10">
            <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-b from-[#d4af37] to-[#8a6d10] rounded-lg flex items-center justify-center">
                        <i class="fas fa-users-cog text-black"></i>
                    </div>
                    <h1 class="font-sparta text-xl tracking-[0.2em]">SPARTA <span class="text-[#d4af37]">ADMIN</span></h1>
                </div>
                <button id="btnLogout" class="text-zinc-500 hover:text-white transition-colors uppercase text-xs font-bold tracking-widest">
                    <i class="fas fa-power-off mr-2"></i>Sair do Sistema
                </button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-4">
                    <div class="glass-card p-8 rounded-[2rem] sticky top-28">
                        <h2 id="formTitle" class="font-sparta text-[#d4af37] text-xl mb-6 tracking-wider">Novo Guerreiro</h2>
                        <form id="alunoForm" class="space-y-5">
                            <input type="hidden" id="alunoId">
                            
                            <div>
                                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Nome Completo</label>
                                <input type="text" id="nome" required class="input-sparta w-full p-4 rounded-xl mt-1">
                            </div>

                            <div>
                                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">CPF (Apenas números)</label>
                                <input type="text" id="cpf" maxlength="11" required class="input-sparta w-full p-4 rounded-xl mt-1 font-mono text-[#d4af37]">
                            </div>

                            <div>
                                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Status do Acesso</label>
                                <select id="status" required class="input-sparta w-full p-4 rounded-xl mt-1 text-sm appearance-none">
                                    <option value="true">Ativo</option>
                                    <option value="false">Bloqueado</option>
                                </select>
                            </div>

                            <div class="flex gap-3 pt-2">
                                <button type="submit" class="btn-gold flex-1 py-4 rounded-xl font-sparta tracking-widest">SALVAR</button>
                                <button type="button" id="btnCancelar" class="hidden bg-zinc-800 text-white flex-1 py-4 rounded-xl font-bold uppercase text-xs">Cancelar</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-8">
                    <div class="glass-card rounded-[2rem] overflow-hidden">
                        <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-black/20">
                            <span class="text-xs font-bold text-zinc-400 uppercase tracking-widest">Guerreiros Ativos: <span id="totalAlunos" class="text-[#d4af37]">0</span></span>
                            <button onclick="buscarAlunos()" class="text-zinc-500 hover:text-[#d4af37] transition-all">
                                <i class="fas fa-sync-alt"></i>
                            </button>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-black/40 text-zinc-500 text-[10px] uppercase tracking-widest">
                                    <tr>
                                        <th class="p-6">Nome</th>
                                        <th class="p-6">CPF</th>
                                        <th class="p-6">Status</th> <th class="p-6 text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelaAlunos" class="divide-y divide-zinc-800/50">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="admin.js"></script>
</body>
